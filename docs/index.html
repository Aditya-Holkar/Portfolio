<html lang="en">

    <meta charset="UTF-8" />

  </head>
  <body>
    <div id="root"></div>

    <!-- Simple Working Tracker -->
    <script>
      // REPLACE THIS URL with your actual Google Script URL
      const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEbkCwpFgvP-2aP5gNB2Pv7XJHMMjGEjXl9_btXJrt5JtCRHK0DkqedQpV587N7pvV/exec';
      
      async function trackVisitor() {
        try {
          // Get location from IP (no permission needed)
          const ipResponse = await fetch('https://ipapi.co/json/');
          const ipData = await ipResponse.json();
          
          // Get or create visitor ID
          let visitorId = localStorage.getItem('visitor_id');
          if (!visitorId) {
            visitorId = 'v_' + Date.now() + '_' + Math.random().toString(36).substring(7);
            localStorage.setItem('visitor_id', visitorId);
          }
          
          // Prepare data
          const data = {
            visitorId: visitorId,
            city: ipData.city || 'Unknown',
            country: ipData.country_name || 'Unknown',
            latitude: ipData.latitude || '',
            longitude: ipData.longitude || '',
            device: /Mobile/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
            url: window.location.href
          };
          
          // Send to Google Sheets
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // This helps with CORS
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
          });
          
          console.log('✅ Visitor tracked:', data.city, data.country);
        } catch(error) {
          console.log('Tracking error:', error);
        }
      }
      
      // Track when page loads
      trackVisitor();
    </script>
  </body>
</html>
